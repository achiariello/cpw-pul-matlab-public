<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 500 15px Arial, sans-serif; fill: #374151; }
      .dim { stroke: #1f2937; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .guide { stroke: #6b7280; stroke-width: 1.5; stroke-dasharray: 6 6; }
      .metal { fill: #f5c242; stroke: #b8860b; stroke-width: 2; }
      .sub { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .air { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 5 L 10 0 L 10 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <text x="30" y="40" class="title">CPS su GaAs - sezione trasversale (esempio MATLAB)</text>

  <rect x="40" y="70" width="900" height="110" class="air"/>
  <text x="60" y="105" class="label">Aria</text>

  <rect x="170" y="120" width="180" height="40" class="metal"/>
  <rect x="630" y="120" width="180" height="40" class="metal"/>
  <text x="185" y="145" class="small">Au: s = 20 um, t = 1 um</text>
  <text x="645" y="145" class="small">Au: s = 20 um, t = 1 um</text>

  <rect x="40" y="180" width="900" height="260" class="sub"/>
  <text x="60" y="220" class="label">Substrato GaAs: h = 1 um, epsr = 12.9</text>

  <line x1="350" y1="120" x2="630" y2="120" class="guide"/>
  <line x1="350" y1="160" x2="630" y2="160" class="guide"/>
  <line x1="360" y1="95" x2="620" y2="95" class="dim"/>
  <text x="430" y="85" class="label">distanza bordi interni = 50 um</text>

  <line x1="170" y1="95" x2="350" y2="95" class="dim"/>
  <text x="215" y="85" class="small">s = 20 um</text>

  <line x1="630" y1="95" x2="810" y2="95" class="dim"/>
  <text x="675" y="85" class="small">s = 20 um</text>

  <line x1="840" y1="180" x2="840" y2="440" class="dim"/>
  <text x="850" y="315" class="label">h = 1 um</text>

  <line x1="840" y1="120" x2="840" y2="160" class="dim"/>
  <text x="850" y="145" class="small">t = 1 um</text>

  <text x="40" y="485" class="small">
    Parametri usati nello script: s=20e-6 m, g=25e-6 m (2g=50e-6 m), h=1e-6 m, epsr=12.9.
  </text>
</svg>
